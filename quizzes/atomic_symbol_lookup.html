<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atomic Symbol Lookup</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #edf2ff, #f8fafc);
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: min(720px, 100%);
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: #0f172a;
    }

    .subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: #64748b;
      font-size: 1rem;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 16px 18px;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      font-size: 1.15rem;
      outline: none;
      text-transform: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    button {
      padding: 0 22px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      display: none;
      border-radius: 20px;
      padding: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      animation: fadeIn 0.25s ease-in;
    }

    .symbol-card {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 24px;
      align-items: center;
    }

    .big-symbol {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: #2563eb;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
    }

    .atomic-number-small {
      font-size: 1rem;
      opacity: 0.9;
    }

    .symbol-text {
      font-size: 3.1rem;
      font-weight: 800;
      line-height: 1;
    }

    .element-name {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 14px;
      color: #0f172a;
    }

    .facts {
      display: grid;
      gap: 10px;
      font-size: 1.1rem;
    }

    .fact {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 12px;
      background: white;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }

    .label {
      color: #64748b;
      font-weight: 600;
    }

    .value {
      color: #0f172a;
      font-weight: 800;
      text-align: right;
    }

    .error {
      display: none;
      padding: 16px;
      border-radius: 14px;
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecdd3;
      font-weight: 650;
      text-align: center;
    }

    .hint {
      margin-top: 22px;
      color: #64748b;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.5;
    }

    .examples {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #334155;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .chip:hover {
      background: #e0e7ff;
      border-color: #818cf8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 24px;
      }

      .search-box {
        flex-direction: column;
      }

      button {
        padding: 14px;
      }

      .symbol-card {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .fact {
        flex-direction: column;
        gap: 4px;
      }

      .value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Atomic Symbol Lookup</h1>
    <p class="subtitle">Type an atomic symbol to get atomic number and atomic weight.</p>

    <div class="search-box">
      <input id="symbolInput" type="text" placeholder="Example: H, O, Na, Fe, Au" maxlength="3" autocomplete="off" />
      <button onclick="searchElement()">Search</button>
    </div>

    <section id="result" class="result">
      <div class="symbol-card">
        <div class="big-symbol">
          <div id="atomicNumberSmall" class="atomic-number-small"></div>
          <div id="symbolText" class="symbol-text"></div>
        </div>

        <div>
          <div id="elementName" class="element-name"></div>

          <div class="facts">
            <div class="fact">
              <span class="label">Atomic Number</span>
              <span id="atomicNumber" class="value"></span>
            </div>
            <div class="fact">
              <span class="label">Atomic Weight</span>
              <span id="atomicWeight" class="value"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="error" class="error">
      Symbol not found. Try symbols like H, C, O, Na, Fe, Cu, Ag, Au.
    </div>

    <div class="hint">
      Symbols are case-insensitive. You can type <b>fe</b>, <b>FE</b>, or <b>Fe</b>.
      <div class="examples">
        <span class="chip" onclick="fillExample('H')">H</span>
        <span class="chip" onclick="fillExample('C')">C</span>
        <span class="chip" onclick="fillExample('O')">O</span>
        <span class="chip" onclick="fillExample('Na')">Na</span>
        <span class="chip" onclick="fillExample('Fe')">Fe</span>
        <span class="chip" onclick="fillExample('Au')">Au</span>
      </div>
    </div>
  </main>

    function normalizeSymbol(text) {
      const trimmed = text.trim();
      if (trimmed.length === 0) return "";
      return trimmed.charAt(0).toUpperCase() + trimmed.slice(1).toLowerCase();
    }

    function searchElement() {
      const input = document.getElementById("symbolInput");
      const symbol = normalizeSymbol(input.value);
      const element = elements[symbol];

      const resultBox = document.getElementById("result");
      const errorBox = document.getElementById("error");

      if (!element) {
        resultBox.style.display = "none";
        errorBox.style.display = "block";
        return;
      }

      document.getElementById("atomicNumberSmall").textContent = element.atomicNumber;
      document.getElementById("symbolText").textContent = symbol;
      document.getElementById("elementName").textContent = element.name;
      document.getElementById("atomicNumber").textContent = element.atomicNumber;
      document.getElementById("atomicWeight").textContent = element.atomicWeight + " u";

      errorBox.style.display = "none";
      resultBox.style.display = "block";
    }

    function fillExample(symbol) {
      document.getElementById("symbolInput").value = symbol;
      searchElement();
    }

    document.getElementById("symbolInput").addEventListener("keyup", function(event) {
      searchElement();
    });

</html>
